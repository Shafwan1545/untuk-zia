<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Cintaku ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    overflow:hidden;
}

/* INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:10;
    transition:1s;
}

#intro button{
    padding:15px 40px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff4b5c,#ff758c);
    color:white;
    cursor:pointer;
}

/* SECTION */
.section{
    min-height:100vh;
    padding:30px;
    color:white;
    background: radial-gradient(circle at top, #2b1055, #7597de);
    display:none;
}

/* HALAMAN 1 */
#main{
    display:none;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:30px;
}

.photo{
    width:250px;
    max-width:80%;
    border-radius:20px;
    box-shadow:0 0 40px pink;
}

.text-area{
    max-width:400px;
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:45px;
    margin-bottom:15px;
}

button{
    margin-top:15px;
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:#ff4b5c;
    color:white;
    cursor:pointer;
}

.exit-btn{
    background:#333;
    margin-left:10px;
}

/* HALAMAN 2 */
#reason{
    text-align:center;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* RESPONSIVE ANDROID */
@media(max-width:768px){
    #main{
        flex-direction:column;
        text-align:center;
    }

    h1{
        font-size:38px;
    }
}

/* HEART */
.heart{
    position:absolute;
    color:pink;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh);}
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
    <h2>Ini khusus buat kamu ❤️</h2>
    <button onclick="startExperience()">Putar Musik Untuk Kamu 🎵</button>
</div>

<!-- HALAMAN 1 -->
<div id="main" class="section">
    <img src="zia.jpg" class="photo">
    <div class="text-area">
        <h1>Untuk Kamu ❤️</h1>
        <p id="typing"></p>
        <button onclick="nextPage()">Aku Mau Bilang Sesuatu 💌</button>
        <button class="exit-btn" onclick="exitWebsite()">Exit</button>
    </div>
</div>

<!-- HALAMAN 2 -->
<div id="reason" class="section">
    <h1>Kenapa Aku Sayang Banget Sama Kamu ❤️</h1>
    <p style="max-width:600px; line-height:1.8;">
        Aku sayang kamu karena kamu selalu berusaha.  
        Karena kamu tetap kuat walau lagi capek.  
        Karena kamu tetap milih aku setiap hari.  
        <br><br>
        Kamu itu rumah buat aku.  
        Dan aku nggak mau kehilangan kamu.
    </p>
    <button onclick="exitWebsite()">Tutup Halaman ❤️</button>
</div>

<audio id="bgMusic" loop>
    <source src="Bersamamu_-_Vierra.mp3" type="audio/mpeg">
</audio>

<script>

// START
function startExperience(){
    document.getElementById("bgMusic").play();
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="flex";
    type();
}

// TYPING
const text="Sayang... aku tahu kamu lagi capek. Tapi aku cuma mau kamu tahu satu hal — kamu adalah alasan aku bahagia. Jangan sedih lama-lama ya, aku selalu ada buat kamu ❤️";
let index=0;
function type(){
    if(index<text.length){
        document.getElementById("typing").innerHTML+=text.charAt(index);
        index++;
        setTimeout(type,40);
    }
}

// NEXT PAGE
function nextPage(){
    document.getElementById("main").style.display="none";
    document.getElementById("reason").style.display="flex";
}

// EXIT FUNCTION
function exitWebsite(){
    document.body.style.opacity="0";
    document.body.style.transition="1s";
    setTimeout(()=>{
        window.close();
        window.location.href="about:blank";
    },1000);
}

// HEART FLOAT
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,400);

</script>

</body>
</html>
